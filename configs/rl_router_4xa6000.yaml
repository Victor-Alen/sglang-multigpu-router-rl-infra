workers:
  - name: rollout-0
    base_url: http://127.0.0.1:30004
    gpu: 5
    tensor_parallel_size: 1
  - name: rollout-1
    base_url: http://127.0.0.1:30005
    gpu: 7
    tensor_parallel_size: 1

rl:
  policy: adaptive-group
  initial_policy_version: 0
  heartbeat_timeout_seconds: 15
  max_policy_lag: 1
  max_prefetched_rollout_batches: 1
  retry_mode: same_seed
  deadline_seconds: 300
  state_dir: results/rl_state_4gpu

trainer:
  gpu_ids: [1, 3]
  backend: fsdp2
  world_size: 2
  activation_checkpointing: true

layout:
  physical_gpu_ids: [1, 3, 5, 7]
  trainer_gpu_ids: [1, 3]
  rollout_gpu_ids: [5, 7]
  rollout_mode: external

